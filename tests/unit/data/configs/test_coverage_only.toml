# Configuration for tests that only need main and coverage sandboxes
# Template variables: ${VAR_NAME} will be expanded from top-level variables or environment

# Top-level template variables (UPPERCASE)
DEFAULT_IMAGE = "n132/arvo:51603-vul"
MAIN_MODEL = "anthropic/claude-sonnet-4-20250514"
TASK_NAME = "test_coverage_only"

# History configuration defaults
src_dir_in_sandbox = "/shared/code"
task_name = "${TASK_NAME}"

[sandbox]
default_image = "${DEFAULT_IMAGE}"
backend = "native"
absolute_shared_data_path = "tests/unit/data/arvo_51603_vul_code.tar.gz"

# Main sandbox configuration
[sandbox.sandboxes.main]
image = "${TASK_NAME}_main"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/main/Dockerfile"
timeout = 300
[sandbox.sandboxes.main.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.main.extra]
initializer_timeout_sec = 1800

# Coverage sandbox configuration
[sandbox.sandboxes.coverage]
image = "${TASK_NAME}_coverage"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/coverage/Dockerfile"
command = "tail -f /dev/null"
timeout = 300
[sandbox.sandboxes.coverage.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.coverage.extra]
initializer_timeout_sec = 1800

[build]
compile_command = "arvo compile"
