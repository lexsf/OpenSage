# SecAgentFramework Default Configuration with Template Variables
# Template variables: ${VAR_NAME} will be expanded from top-level variables or environment

# Top-level template variables (UPPERCASE)
DEFAULT_IMAGE = "ubuntu:20.04"
NEO4J_PASSWORD = "callgraphn4j!"
MAIN_MODEL = "openai/gpt-5"
TASK_NAME = "my_analysis_task"
POC_DIR = "/tmp/poc"
COMPILE_COMMAND = "arvo compile"
RUN_COMMAND = "arvo"
AGENT_STORAGE_PATH = ""
# History configuration defaults
MAX_TOOL_RESPONSE_LENGTH = 10000
MAX_HISTORY_SUMMARY_LENGTH = 100000
COMPACTION_PERCENT = 100
# Agent ensemble defaults
AVAILABLE_MODELS = "openai/gpt-5,openai/o4-mini"
# Host and Ports
NEO4J_BOLT_PORT = 7687
NEO4J_HTTP_PORT = 7474
PDB_PORT = 1112
GDB_PORT = 1111
JOERN_PORT = 18087
ABSOLUTE_SHARED_DATA_PATH = ""
HOST_SHARED_MEM_DIR = ""


task_name = "${TASK_NAME}"
src_dir_in_sandbox = "/shared/code"
agent_storage_path = "${AGENT_STORAGE_PATH}"
load_dynamic_agents = false
default_host = ""

[neo4j]
user = "neo4j"
password = "${NEO4J_PASSWORD}"
bolt_port = "${NEO4J_BOLT_PORT}"
neo4j_http_port = "${NEO4J_HTTP_PORT}"

[sandbox]
backend = "native"
absolute_shared_data_path = "${ABSOLUTE_SHARED_DATA_PATH}"
host_shared_mem_dir = "${HOST_SHARED_MEM_DIR}"

# OpenSandbox backend configuration (used when sandbox.backend = "opensandbox")
[sandbox.opensandbox]
domain = "127.0.0.1:8080"
protocol = "http"
api_key = ""
request_timeout_sec = 30
use_server_proxy = false
runtime_type = "docker" # docker | kubernetes
docker_host = ""
docker_remote_host = ""
namespace = "default"
context = ""
kubeconfig = ""
default_timeout_sec = 1800
execd_port = 44772
request_working_directory = ""

# Main sandbox configuration
[sandbox.sandboxes.main]
image = "${DEFAULT_IMAGE}_main"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/main/Dockerfile"
timeout = 300
[sandbox.sandboxes.main.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.main.extra]
initializer_timeout_sec = 1800

# GDB MCP sandbox configuration
[sandbox.sandboxes.gdb_mcp]
image = "${TASK_NAME}_gdb_mcp"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/gdb_mcp/Dockerfile"
command = ""
[sandbox.sandboxes.gdb_mcp.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.gdb_mcp.ports]
"1111/tcp" = "${GDB_PORT}"
[sandbox.sandboxes.gdb_mcp.extra]
initializer_timeout_sec = 1800

# PDB MCP sandbox configuration
[sandbox.sandboxes.pdb_mcp]
image = "${TASK_NAME}_pdb_mcp"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/pdb_mcp/Dockerfile"
command = ""
[sandbox.sandboxes.pdb_mcp.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.pdb_mcp.ports]
"1112/tcp" = "${PDB_PORT}"
[sandbox.sandboxes.pdb_mcp.extra]
initializer_timeout_sec = 1800

# CodeQL sandbox configuration
[sandbox.sandboxes.codeql]
image = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.codeql.extra]
initializer_timeout_sec = 1800

# Coverage sandbox configuration
[sandbox.sandboxes.coverage]
image = "${DEFAULT_IMAGE}_coverage"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/coverage/Dockerfile"
command = "tail -f /dev/null"
timeout = 300
[sandbox.sandboxes.coverage.build_args]
BASE_IMAGE = "${DEFAULT_IMAGE}"
[sandbox.sandboxes.coverage.extra]
initializer_timeout_sec = 1800

# Joern sandbox
[sandbox.sandboxes.joern]
image = "opensage/joern"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/joern/Dockerfile"
command = ""
[sandbox.sandboxes.joern.environment]
JAVA_OPTS = "-Xmx16G -Xms4G"
[sandbox.sandboxes.joern.ports]
"8081/tcp" = "${JOERN_PORT}"
[sandbox.sandboxes.joern.extra]
initializer_timeout_sec = 1800

# Neo4j sandbox configuration
[sandbox.sandboxes.neo4j]
image = "neo4j:5.26.12-enterprise"
command = "" # Use Neo4j's default startup command
[sandbox.sandboxes.neo4j.environment]
NEO4J_dbms_directories_data = "/var/lib/neo4j/data-custom"
NEO4J_dbms_directories_logs = "/var/lib/neo4j/logs-custom"
NEO4J_ACCEPT_LICENSE_AGREEMENT = "yes"
NEO4J_AUTH = "neo4j/${NEO4J_PASSWORD}"
NEO4J_PLUGINS = '["graph-data-science", "apoc"]'
NEO4J_server_directories_import = "/shared/neo4j/import"
NEO4J_apoc_import_file_enabled = "true"
NEO4J_apoc_export_file_enabled = "true"
NEO4J_dbms_mode = "SINGLE"
[sandbox.sandboxes.neo4j.ports]
"7474/tcp" = "${NEO4J_HTTP_PORT}" # HTTP port
"7687/tcp" = "${NEO4J_BOLT_PORT}" # Bolt port
[sandbox.sandboxes.neo4j.extra]
initializer_timeout_sec = 1800

[llm]
# Main model configuration
[llm.model_configs.main]
model_name = "${MAIN_MODEL}"
temperature = 0.7
max_tokens = 4096
rpm = 60
tpm = 60000

# Drop/summarize model configuration
[llm.model_configs.summarize]
model_name = "${MAIN_MODEL}"
temperature = 0.3
max_tokens = 2048
rpm = 30
tpm = 30000

# Flag claims model configuration
[llm.model_configs.flag_claims]
model_name = "openai/gpt-5"
temperature = 0.1
max_tokens = 1024
rpm = 30
tpm = 30000

[history]
max_tool_response_length = "${MAX_TOOL_RESPONSE_LENGTH}"
enable_quota_countdown = true

[history.events_compaction]
# Trigger when either budget is exceeded
max_history_summary_length = "${MAX_HISTORY_SUMMARY_LENGTH}"
compaction_percent = "${COMPACTION_PERCENT}"

[plugins]
# No plugins enabled by default. Explicitly list plugins in your agent config.
# Execution order matches the list order — see docs/wiki/Plugins.md for details.
enabled = []


[agent_ensemble]
enforce_thread_safe_tools = false
thread_safe_tools = []
available_models_for_ensemble = "${AVAILABLE_MODELS}"

[build]
poc_dir = "${POC_DIR}"
compile_command = "${COMPILE_COMMAND}"
run_command = "${RUN_COMMAND}"
target_type = "default"

[mcp]
# GDB MCP service configuration
[mcp.services.gdb_mcp]
sse_port = "${GDB_PORT}"

# PDB MCP service configuration
[mcp.services.pdb_mcp]
sse_port = "${PDB_PORT}"
