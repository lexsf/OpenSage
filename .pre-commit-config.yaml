repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.12.11
    hooks:
        # Run the linter.
        # Ignore F (pyflakes) currently
        -   id: ruff-check
            args: [ --fix, --ignore=F ]
            types: [python]
        # Run the formatter.
        -   id: ruff-format
            types: [python]
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
        exclude: ^third_party/
    -   id: end-of-file-fixer
        exclude: ^third_party/
    -   id: trailing-whitespace
        exclude: ^third_party/
