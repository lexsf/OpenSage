# OpenSage config for sample_tool_combo

task_name = "sample_tool_combo_task"
src_dir_in_sandbox = "/shared/code"

[sandbox]
backend = "native"

[sandbox.sandboxes.main]
image = "ubuntu:20.04_main"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/main/Dockerfile"
timeout = 300

[sandbox.sandboxes.main.build_args]
BASE_IMAGE = "ubuntu:20.04"

[llm]
[llm.model_configs.main]
model_name = "openai/o4-mini"
temperature = 0.2
max_tokens = 2048


[plugins]
enabled = [
    "history_summarizer_plugin",
    "tool_response_summarizer_plugin",
    "quota_after_tool_plugin",
]
