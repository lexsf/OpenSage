# OpenSage config for sample_summarization (requires neo4j)

task_name = "sample_summarization_task"
src_dir_in_sandbox = "/shared/code"

[sandbox]
backend = "native"

[sandbox.sandboxes.main]
image = "ubuntu:20.04_main"
project_relative_dockerfile_path = "src/opensage/templates/dockerfiles/main/Dockerfile"
timeout = 300

[sandbox.sandboxes.main.build_args]
BASE_IMAGE = "ubuntu:20.04"

# Neo4j sandbox used by history logging and graph queries
[sandbox.sandboxes.neo4j]
image = "neo4j:5.26.12-enterprise"
command = ""

[sandbox.sandboxes.neo4j.environment]
NEO4J_dbms_directories_data = "/var/lib/neo4j/data-custom"
NEO4J_dbms_directories_logs = "/var/lib/neo4j/logs-custom"
NEO4J_ACCEPT_LICENSE_AGREEMENT = "yes"
NEO4J_AUTH = "neo4j/callgraphn4j!"
NEO4J_PLUGINS = '["graph-data-science", "apoc"]'
NEO4J_server_directories_import = "/shared/neo4j/import"
NEO4J_apoc_import_file_enabled = "true"
NEO4J_apoc_export_file_enabled = "true"
NEO4J_dbms_mode = "SINGLE"

[sandbox.sandboxes.neo4j.ports]
"7474/tcp" = 7474
"7687/tcp" = 7687

[neo4j]
user = "neo4j"
password = "callgraphn4j!"
bolt_port = 7687
neo4j_http_port = 7474

[llm]
[llm.model_configs.main]
model_name = "openai/o4-mini"
temperature = 0.2
max_tokens = 2048

[llm.model_configs.summarize]
model_name = "openai/gpt-5"
temperature = 0.3
max_tokens = 2048

[history]
max_tool_response_length = 100
enable_quota_countdown = true

[history.events_compaction]
max_history_summary_length = 300
compaction_percent = 100

[plugins]
enabled = [
    "history_summarizer_plugin",
    "tool_response_summarizer_plugin",
    "quota_after_tool_plugin",
]
