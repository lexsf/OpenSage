# SLIME training config — debug / small-scale testing
# Keys are SLIME train.py CLI arg names (without leading --)
# These override the defaults in the SLIME launch script.

# Rollout
num-rollout: 4
rollout-batch-size: 2
n-samples-per-prompt: 1
rollout-max-response-len: 1024
rollout-temperature: 1
global-batch-size: 2

# Optimizer
lr: 1e-6
lr-decay-style: constant
weight-decay: 0.1
adam-beta1: 0.9
adam-beta2: 0.98

# GRPO
kl-loss-coef: 0.00
kl-loss-type: low_var_kl
entropy-coef: 0.00
eps-clip: 0.2
eps-clip-high: 0.28

# Performance
tensor-model-parallel-size: 2
max-tokens-per-gpu: 9216

# Checkpoint
save-interval: 20

# Eval
eval-interval: 999
